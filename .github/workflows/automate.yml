name: Autonomous Affiliate Engine

on:
  schedule:
    # Run daily at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Allow manual triggering from GitHub UI

jobs:
  run-automation:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Automation Engine
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        python automate.py

    - name: Commit & Push Changes
      run: |
        git config --global user.name "LuxeBeauty Automation Bot"
        git config --global user.email "bot@luxebeauty.internal"
        git add -A
        # Check if there are any changes to commit
        if git diff-index --quiet HEAD --; then
          echo "No new deals or website modifications found today."
        else
          git commit -m "[BOT] Daily auto-aggregation: new reviews and social pins added"
          git push
        fi
